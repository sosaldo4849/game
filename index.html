<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-Нолики Онлайн</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        html, body {
            height: 100%;
        }

        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .screen.active {
            display: flex;
        }

        /* ============== ЭКРАН ЗАГРУЗКИ ============== */
        .loading-screen {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            flex-direction: column;
        }

        .loading-logo {
            font-size: 80px;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .loading-text {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 40px;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ============== ЭКРАН АВТОРИЗАЦИИ ============== */
        .auth-screen {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-logo {
            font-size: 60px;
            margin-bottom: 20px;
            color: #667eea;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 800;
            color: #333333;
            margin-bottom: 10px;
        }

        .auth-subtitle {
            font-size: 14px;
            color: #666666;
        }

        .auth-divider {
            text-align: center;
            margin: 30px 0;
            color: #999999;
            font-size: 12px;
            position: relative;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: #dddddd;
        }

        .auth-divider::before {
            left: 0;
        }

        .auth-divider::after {
            right: 0;
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 12px;
            font-family: 'Roboto', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .auth-btn.google {
            background: #ffffff;
            color: #333333;
            border: 1px solid #dddddd;
        }

        .auth-btn.google:hover {
            background: #f5f5f5;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .auth-btn.phone {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
        }

        .auth-btn.phone:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .auth-input {
            width: 100%;
            background: #f5f5f5;
            border: 1px solid #dddddd;
            border-radius: 10px;
            padding: 12px 16px;
            color: #333333;
            font-size: 14px;
            margin-bottom: 12px;
            font-family: 'Roboto', sans-serif;
        }

        .auth-input:focus {
            outline: none;
            border-color: #667eea;
            background: #ffffff;
        }

        #phoneInputContainer {
            display: none;
        }

        #phoneInputContainer.active {
            display: block;
        }

        /* ============== ЭКРАН КОМНАТ ============== */
        .rooms-screen {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
        }

        .rooms-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .rooms-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .rooms-title {
            font-size: 28px;
            font-weight: 800;
            color: #333333;
            margin-bottom: 10px;
        }

        .rooms-subtitle {
            font-size: 14px;
            color: #666666;
        }

        .rooms-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .room-section {
            flex: 1;
        }

        .room-section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333333;
            margin-bottom: 15px;
        }

        .create-room-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .create-room-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .rooms-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .room-item {
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .room-item:hover {
            background: #eeeeee;
            border-color: #667eea;
        }

        .room-info {
            flex: 1;
        }

        .room-name {
            font-size: 16px;
            font-weight: 600;
            color: #333333;
        }

        .room-players {
            font-size: 12px;
            color: #999999;
            margin-top: 4px;
        }

        .join-room-btn {
            padding: 8px 16px;
            background: #667eea;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .join-room-btn:hover {
            background: #764ba2;
        }

        .join-room-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        .logout-btn {
            width: 100%;
            padding: 12px;
            background: #f5f5f5;
            color: #333333;
            border: 1px solid #dddddd;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #eeeeee;
        }

        /* ============== ЭКРАН ИГРЫ ============== */
        .game-screen {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eeeeee;
        }

        .game-title {
            font-size: 24px;
            font-weight: 800;
            color: #333333;
        }

        .game-status {
            text-align: center;
            margin-bottom: 20px;
        }

        .status-text {
            font-size: 14px;
            color: #666666;
            margin-bottom: 10px;
        }

        .current-player {
            font-size: 18px;
            font-weight: 700;
            color: #667eea;
        }

        .players-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .player-info {
            text-align: center;
        }

        .player-symbol {
            font-size: 36px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .player-name {
            font-size: 14px;
            color: #666666;
        }

        .player-info.opponent .player-symbol {
            color: #764ba2;
        }

        .player-info.current {
            background: #ffffff;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #667eea;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 30px;
            aspect-ratio: 1;
        }

        .game-cell {
            background: #f5f5f5;
            border: none;
            border-radius: 10px;
            font-size: 48px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
        }

        .game-cell:hover:not(:disabled) {
            background: #eeeeee;
            transform: scale(1.05);
        }

        .game-cell:disabled {
            cursor: not-allowed;
            color: #999999;
        }

        .game-cell.x {
            color: #667eea;
        }

        .game-cell.o {
            color: #764ba2;
        }

        .game-actions {
            display: flex;
            gap: 10px;
        }

        .game-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .restart-btn {
            background: #667eea;
            color: #ffffff;
        }

        .restart-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .leave-btn {
            background: #f5f5f5;
            color: #333333;
            border: 1px solid #dddddd;
        }

        .leave-btn:hover {
            background: #eeeeee;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #333333;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: #667eea;
        }

        /* ============== МОДАЛЬНЫЕ ОКНА ============== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 800;
            color: #333333;
            margin-bottom: 20px;
        }

        .modal-message {
            font-size: 16px;
            color: #666666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .modal-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 768px) {
            .rooms-content {
                grid-template-columns: 1fr;
            }

            .game-board {
                gap: 8px;
            }

            .game-cell {
                font-size: 36px;
            }

            .auth-container,
            .rooms-container,
            .game-container {
                padding: 30px 20px;
            }

            .game-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- ЭКРАН ЗАГРУЗКИ -->
    <div class="screen loading-screen active" id="loadingScreen">
        <div class="loading-logo"><i class="fas fa-gamepad"></i></div>
        <div class="loading-text">Крестики-Нолики</div>
        <div class="loading-spinner"></div>
    </div>

    <!-- ЭКРАН АВТОРИЗАЦИИ -->
    <div class="screen auth-screen" id="authScreen">
        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-logo"><i class="fas fa-gamepad"></i></div>
                <div class="auth-title">Крестики-Нолики</div>
                <div class="auth-subtitle">Онлайн игра для двоих</div>
            </div>

            <button class="auth-btn google" id="googleSignInBtn">
                <i class="fab fa-google"></i>
                Войти через Google
            </button>

            <div class="auth-divider">или</div>

            <button class="auth-btn phone" id="phoneSignInBtn">
                <i class="fas fa-phone"></i>
                Войти по номеру телефона
            </button>

            <div id="phoneInputContainer">
                <input type="tel" class="auth-input" id="phoneInput" placeholder="+7 (999) 999-99-99">
                <button class="auth-btn phone" id="sendCodeBtn">
                    <i class="fas fa-check"></i>
                    Отправить код
                </button>
                <input type="text" class="auth-input" id="codeInput" placeholder="Введите код верификации" style="display: none;">
                <button class="auth-btn phone" id="verifyCodeBtn" style="display: none;">
                    <i class="fas fa-check"></i>
                    Проверить код
                </button>
            </div>
        </div>
    </div>

    <!-- ЭКРАН КОМНАТ -->
    <div class="screen rooms-screen" id="roomsScreen">
        <div class="rooms-container">
            <div class="rooms-header">
                <div class="rooms-title">Поиск игры</div>
                <div class="rooms-subtitle" id="currentUserDisplay">Не авторизован</div>
            </div>

            <div class="rooms-content">
                <div class="room-section">
                    <div class="room-section-title">Создать комнату</div>
                    <button class="create-room-btn" id="createRoomBtn">
                        <i class="fas fa-plus"></i> Создать
                    </button>
                </div>

                <div class="room-section">
                    <div class="room-section-title">Доступные комнаты</div>
                    <div class="rooms-list" id="roomsList"></div>
                </div>
            </div>

            <button class="logout-btn" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Выход
            </button>
        </div>
    </div>

    <!-- ЭКРАН ИГРЫ -->
    <div class="screen game-screen" id="gameScreen">
        <div class="game-container">
            <div class="game-header">
                <div class="game-title" id="roomName">Комната</div>
                <button class="close-btn" id="leaveGameBtn"><i class="fas fa-times"></i></button>
            </div>

            <div class="game-status">
                <div class="status-text" id="statusText">Ожидание второго игрока...</div>
                <div class="current-player" id="currentPlayerText">Ваш ход (X)</div>
            </div>

            <div class="players-info">
                <div class="player-info current" id="player1Info">
                    <div class="player-symbol">X</div>
                    <div class="player-name" id="player1Name">Вы</div>
                </div>
                <div class="player-info" id="player2Info" style="opacity: 0.5;">
                    <div class="player-symbol">O</div>
                    <div class="player-name" id="player2Name">Ожидание...</div>
                </div>
            </div>

            <div class="game-board" id="gameBoard">
                <button class="game-cell" data-index="0"></button>
                <button class="game-cell" data-index="1"></button>
                <button class="game-cell" data-index="2"></button>
                <button class="game-cell" data-index="3"></button>
                <button class="game-cell" data-index="4"></button>
                <button class="game-cell" data-index="5"></button>
                <button class="game-cell" data-index="6"></button>
                <button class="game-cell" data-index="7"></button>
                <button class="game-cell" data-index="8"></button>
            </div>

            <div class="game-actions">
                <button class="game-btn restart-btn" id="restartGameBtn" style="display: none;">
                    <i class="fas fa-redo"></i> Новая игра
                </button>
                <button class="game-btn leave-btn" id="leaveGameBtn2">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </div>
    </div>

    <!-- МОДАЛИ -->
    <div class="modal-overlay" id="resultModal">
        <div class="modal">
            <div class="modal-title" id="resultTitle">Вы выиграли!</div>
            <div class="modal-message" id="resultMessage">Поздравляем с победой!</div>
            <button class="modal-btn" id="resultBtn">Начать новую игру</button>
        </div>
    </div>

    <script type="module">
        // ============== FIREBASE CONFIGURATION ==============
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithPopup, 
            GoogleAuthProvider,
            RecaptchaVerifier,
            signInWithPhoneNumber,
            signOut,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { 
            getDatabase, 
            ref, 
            set, 
            update,
            onValue,
            get
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        // ⚠️ ПОДСТАВЬТЕ СВОЙ КОНФИГ ОТСЮДА: https://console.firebase.google.com/
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "your-project.firebaseapp.com",
            databaseURL: "https://your-project-default-rtdb.firebaseio.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abc123",
            measurementId: "G-ABC123"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        // ============== ПЕРЕМЕННЫЕ СОСТОЯНИЯ ==============
        let currentUser = null;
        let currentRoom = null;
        let currentGameState = null;
        let recaptchaVerifier = null;
        let confirmationResult = null;

        // ============== ПРОВЕРКА АВТОРИЗАЦИИ ==============
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = {
                    uid: user.uid,
                    displayName: user.displayName || user.phoneNumber || 'Player'
                };
                setTimeout(() => {
                    document.getElementById('loadingScreen').classList.remove('active');
                }, 1000);
                showScreen('roomsScreen');
                loadRooms();
            } else {
                currentUser = null;
                setTimeout(() => {
                    document.getElementById('loadingScreen').classList.remove('active');
                }, 1000);
                showScreen('authScreen');
            }
        });

        // ============== УПРАВЛЕНИЕ ЭКРАНАМИ ==============
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
        }

        // ============== GOOGLE АВТОРИЗАЦИЯ ==============
        document.getElementById('googleSignInBtn').addEventListener('click', async () => {
            try {
                const provider = new GoogleAuthProvider();
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error('Google Sign In Error:', error);
                alert('Ошибка входа через Google');
            }
        });

        // ============== PHONE АВТОРИЗАЦИЯ ==============
        document.getElementById('phoneSignInBtn').addEventListener('click', () => {
            document.getElementById('phoneInputContainer').classList.add('active');
        });

        document.getElementById('sendCodeBtn').addEventListener('click', async () => {
            const phoneNumber = document.getElementById('phoneInput').value.trim();
            
            if (!phoneNumber) {
                alert('Введите номер телефона');
                return;
            }

            try {
                if (!recaptchaVerifier) {
                    recaptchaVerifier = new RecaptchaVerifier(auth, 'sendCodeBtn', {
                        'size': 'invisible'
                    });
                }

                confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, recaptchaVerifier);
                document.getElementById('phoneInput').style.display = 'none';
                document.getElementById('sendCodeBtn').style.display = 'none';
                document.getElementById('codeInput').style.display = 'block';
                document.getElementById('verifyCodeBtn').style.display = 'block';
            } catch (error) {
                console.error('Phone Sign In Error:', error);
                alert('Ошибка отправки кода');
            }
        });

        document.getElementById('verifyCodeBtn').addEventListener('click', async () => {
            const code = document.getElementById('codeInput').value.trim();
            
            if (!code) {
                alert('Введите код верификации');
                return;
            }

            try {
                await confirmationResult.confirm(code);
            } catch (error) {
                console.error('Code Verification Error:', error);
                alert('Неверный код');
            }
        });

        // ============== ВЫХОД ============== 
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            currentUser = null;
            showScreen('authScreen');
        });

        // ============== РАБОТА С КОМНАТАМИ ==============
        function loadRooms() {
            const roomsRef = ref(database, 'rooms');
            onValue(roomsRef, (snapshot) => {
                const roomsList = document.getElementById('roomsList');
                roomsList.innerHTML = '';

                if (snapshot.exists()) {
                    const rooms = snapshot.val();
                    Object.entries(rooms).forEach(([roomId, room]) => {
                        if (!room.player2 && room.player1.uid !== currentUser.uid) {
                            const roomItem = document.createElement('div');
                            roomItem.className = 'room-item';
                            roomItem.innerHTML = `
                                <div class="room-info">
                                    <div class="room-name">${room.name}</div>
                                    <div class="room-players">Хозяин: ${room.player1.displayName}</div>
                                </div>
                                <button class="join-room-btn" onclick="joinRoom('${roomId}')">
                                    Присоединиться
                                </button>
                            `;
                            roomsList.appendChild(roomItem);
                        }
                    });
                }
            });

            document.getElementById('currentUserDisplay').textContent = `Вход как: ${currentUser.displayName}`;
        }

        // ============== СОЗДАНИЕ КОМНАТЫ ==============
        document.getElementById('createRoomBtn').addEventListener('click', async () => {
            const roomId = Date.now().toString();
            const roomName = `Комната ${Math.floor(Math.random() * 1000)}`;

            const roomData = {
                id: roomId,
                name: roomName,
                player1: {
                    uid: currentUser.uid,
                    displayName: currentUser.displayName
                },
                board: Array(9).fill(null),
                currentPlayer: 1,
                gameState: 'waiting',
                createdAt: new Date().toISOString()
            };

            try {
                await set(ref(database, `rooms/${roomId}`), roomData);
                currentRoom = roomId;
                showGameScreen();
            } catch (error) {
                console.error('Create Room Error:', error);
                alert('Ошибка создания комнаты');
            }
        });

        window.joinRoom = async (roomId) => {
            try {
                const roomRef = ref(database, `rooms/${roomId}`);
                const snapshot = await get(roomRef);
                
                if (snapshot.exists()) {
                    const room = snapshot.val();
                    await update(roomRef, {
                        player2: {
                            uid: currentUser.uid,
                            displayName: currentUser.displayName
                        },
                        gameState: 'playing'
                    });
                    currentRoom = roomId;
                    showGameScreen();
                }
            } catch (error) {
                console.error('Join Room Error:', error);
                alert('Ошибка присоединения к комнате');
            }
        };

        // ============== ЭКРАН ИГРЫ ==============
        function showGameScreen() {
            showScreen('gameScreen');
            const roomRef = ref(database, `rooms/${currentRoom}`);
            
            onValue(roomRef, (snapshot) => {
                if (snapshot.exists()) {
                    currentGameState = snapshot.val();
                    updateGameUI();
                } else {
                    showScreen('roomsScreen');
                }
            });
        }

        function updateGameUI() {
            const room = currentGameState;
            
            // Обновляем имена игроков
            document.getElementById('roomName').textContent = room.name;
            document.getElementById('player1Name').textContent = room.player1.displayName;
            
            if (room.player2) {
                document.getElementById('player2Name').textContent = room.player2.displayName;
                document.getElementById('player2Info').style.opacity = '1';
            }

            // Определяем, какой символ у игрока
            const isPlayer1 = room.player1.uid === currentUser.uid;
            const playerSymbol = isPlayer1 ? 'X' : 'O';
            const playerNumber = isPlayer1 ? 1 : 2;

            // Обновляем статус
            if (room.gameState === 'waiting') {
                document.getElementById('statusText').textContent = 'Ожидание второго игрока...';
            } else if (room.gameState === 'playing') {
                const currentSymbol = room.currentPlayer === 1 ? 'X' : 'O';
                const isCurrentPlayer = (isPlayer1 && room.currentPlayer === 1) || 
                                       (!isPlayer1 && room.currentPlayer === 2);
                
                if (isCurrentPlayer) {
                    document.getElementById('statusText').textContent = 'Ваш ход';
                    document.getElementById('player1Info').classList.toggle('current', isPlayer1);
                    document.getElementById('player2Info').classList.toggle('current', !isPlayer1);
                } else {
                    document.getElementById('statusText').textContent = 'Ход противника';
                    document.getElementById('player1Info').classList.toggle('current', false);
                    document.getElementById('player2Info').classList.toggle('current', false);
                }
                
                document.getElementById('currentPlayerText').textContent = `Ход: ${currentSymbol}`;
            } else if (room.gameState === 'won') {
                showResultModal(room.winner, isPlayer1);
                document.getElementById('restartGameBtn').style.display = 'block';
            } else if (room.gameState === 'draw') {
                showResultModal('draw', isPlayer1);
                document.getElementById('restartGameBtn').style.display = 'block';
            }

            // Обновляем доску
            const cells = document.querySelectorAll('.game-cell');
            cells.forEach((cell, index) => {
                const value = room.board[index];
                cell.textContent = value || '';
                cell.className = 'game-cell';
                if (value) {
                    cell.classList.add(value === 'X' ? 'x' : 'o');
                    cell.disabled = true;
                } else {
                    cell.disabled = room.gameState !== 'playing' || 
                                   (room.currentPlayer === 1 && !isPlayer1) ||
                                   (room.currentPlayer === 2 && isPlayer1);
                }
            });
        }

        // ============== КЛИКИ ПО ЯЧЕЙКАМ ==============
        document.querySelectorAll('.game-cell').forEach(cell => {
            cell.addEventListener('click', async (e) => {
                const index = parseInt(e.target.dataset.index);
                const room = currentGameState;
                const isPlayer1 = room.player1.uid === currentUser.uid;
                const playerNumber = isPlayer1 ? 1 : 2;

                if (room.board[index] !== null) {
                    alert('Ячейка уже занята');
                    return;
                }

                if ((playerNumber === 1 && room.currentPlayer !== 1) ||
                    (playerNumber === 2 && room.currentPlayer !== 2)) {
                    alert('Это не ваш ход');
                    return;
                }

                const newBoard = [...room.board];
                const symbol = playerNumber === 1 ? 'X' : 'O';
                newBoard[index] = symbol;

                // Проверяем победу
                const result = checkWin(newBoard);
                let newGameState = 'playing';
                let winner = null;

                if (result.winner) {
                    newGameState = 'won';
                    winner = result.winner;
                } else if (result.draw) {
                    newGameState = 'draw';
                }

                const nextPlayer = room.currentPlayer === 1 ? 2 : 1;

                try {
                    await update(ref(database, `rooms/${currentRoom}`), {
                        board: newBoard,
                        currentPlayer: nextPlayer,
                        gameState: newGameState,
                        winner: winner
                    });
                } catch (error) {
                    console.error('Update Board Error:', error);
                }
            });
        });

        // ============== ПРОВЕРКА ПОБЕДЫ ==============
        function checkWin(board) {
            const lines = [
                [0, 1, 2],
                [3, 4, 5],
                [6, 7, 8],
                [0, 3, 6],
                [1, 4, 7],
                [2, 5, 8],
                [0, 4, 8],
                [2, 4, 6]
            ];

            for (let line of lines) {
                const [a, b, c] = line;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return { winner: board[a] };
                }
            }

            if (board.every(cell => cell !== null)) {
                return { draw: true };
            }

            return {};
        }

        // ============== МОДАЛЬ РЕЗУЛЬТАТА ==============
        function showResultModal(result, isPlayer1) {
            const modal = document.getElementById('resultModal');
            const title = document.getElementById('resultTitle');
            const message = document.getElementById('resultMessage');

            if (result === 'draw') {
                title.textContent = 'Ничья!';
                message.textContent = 'Игра закончилась вничью.';
            } else if ((result === 'X' && isPlayer1) || (result === 'O' && !isPlayer1)) {
                title.textContent = 'Вы выиграли!';
                message.textContent = 'Поздравляем с победой!';
            } else {
                title.textContent = 'Вы проиграли!';
                message.textContent = 'Лучше повезет в следующий раз.';
            }

            modal.classList.add('active');
        }

        document.getElementById('resultBtn').addEventListener('click', async () => {
            document.getElementById('resultModal').classList.remove('active');
            document.getElementById('restartGameBtn').style.display = 'none';

            const room = currentGameState;
            try {
                await update(ref(database, `rooms/${currentRoom}`), {
                    board: Array(9).fill(null),
                    currentPlayer: 1,
                    gameState: 'playing',
                    winner: null
                });
            } catch (error) {
                console.error('Restart Error:', error);
            }
        });

        // ============== ВЫХОД ИЗ ИГРЫ ==============
        function leaveGame() {
            currentGameState = null;
            currentRoom = null;
            showScreen('roomsScreen');
            loadRooms();
        }

        document.getElementById('leaveGameBtn').addEventListener('click', leaveGame);
        document.getElementById('leaveGameBtn2').addEventListener('click', leaveGame);
    </script>
</body>
</html>
